gpu: RTX 5090
min_gpu_ram: 32000 # MB
disk_space: 100 # GB
max_price: 0.45 # $/hr
max_bw_price: 0.0010 # $/GB download; filters out expensive bandwidth hosts ($10/TB ceiling)
image: vastai/comfy:v0.16.4-cuda-12.9-py312
remote_path: /workspace/avatar-factory
label: avatar-factory
ssh_key: ~/.ssh/id_ed25519
geolocation: "" # "worldwide" # empty = worldwide EU - europe
health_check_interval: 120 # seconds between background server health checks (0 = disabled)
search_retry_delay: 30 # seconds between offer search retries when no GPU available
max_search_attempts: 20 # max search retries before giving up (~10 min at 30s)
extra_filters:
  inet_down: { "gte": 4000 } # min 500 Mbps download
  num_gpus: { "eq": 1 }
  cuda_max_good: { "gte": 13.0 } # RTX 5090 (Blackwell) needs CUDA 13.0+
